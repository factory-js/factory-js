packages:
  - packages/*
  - examples/*
  - apps/*

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - better-sqlite3
  - esbuild
  - prisma

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
allowBuilds:
  "@prisma/engines": true
  better-sqlite3: true
  es5-ext: true
  esbuild: true
  prisma: true
  unrs-resolver: true
